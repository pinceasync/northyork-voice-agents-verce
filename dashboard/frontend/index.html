<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>North York Voice Agents</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: "#0f1117",
            card:    "#1a1d27",
            border:  "#2a2d3a",
            accent:  "#6366f1",
          }
        }
      }
    }
  </script>
  <style>
    .tab-btn { color: #94a3b8; }
    .tab-btn.active { background: #1a1d27; color: #fff; border: 1px solid #2a2d3a; }
  </style>
</head>
<body class="bg-surface text-slate-200 min-h-screen font-sans">

  <header class="border-b border-border px-8 py-4 flex items-center justify-between">
    <span class="font-semibold text-white tracking-tight">North York Voice Agents</span>
    <div class="flex gap-2">
      <button onclick="showTab('overview')" id="tab-overview" class="tab-btn active px-4 py-1.5 rounded-lg text-sm">Overview</button>
      <button onclick="showTab('chat')" id="tab-chat" class="tab-btn px-4 py-1.5 rounded-lg text-sm">Test Agent</button>
    </div>
  </header>

  <!-- Overview Tab -->
  <div id="view-overview">
    <main class="px-8 py-6 max-w-7xl mx-auto space-y-8">
      <section class="grid grid-cols-2 gap-4">
        <div class="bg-card border border-border rounded-xl p-5">
          <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Calls Today</p>
          <p class="text-3xl font-bold text-white" id="stat-calls">—</p>
        </div>
        <div class="bg-card border border-border rounded-xl p-5">
          <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Leads Captured</p>
          <p class="text-3xl font-bold text-white" id="stat-leads">—</p>
        </div>
      </section>

      <section>
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-3">Recent Leads</h2>
        <div class="bg-card border border-border rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border text-xs text-slate-400 uppercase tracking-widest">
                <th class="text-left px-5 py-3">Name</th>
                <th class="text-left px-5 py-3">Phone</th>
                <th class="text-left px-5 py-3">Problem</th>
                <th class="text-left px-5 py-3">Agent</th>
                <th class="text-left px-5 py-3">Time</th>
              </tr>
            </thead>
            <tbody id="leads-body">
              <tr><td colspan="5" class="px-5 py-6 text-slate-500 text-center">No leads yet</td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <section>
        <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-widest mb-3">Recent Conversations</h2>
        <div class="bg-card border border-border rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border text-xs text-slate-400 uppercase tracking-widest">
                <th class="text-left px-5 py-3">Agent</th>
                <th class="text-left px-5 py-3">Status</th>
                <th class="text-left px-5 py-3">Started</th>
                <th class="text-left px-5 py-3">Action</th>
              </tr>
            </thead>
            <tbody id="convs-body">
              <tr><td colspan="4" class="px-5 py-6 text-slate-500 text-center">No conversations yet</td></tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <!-- Chat Tab -->
  <div id="view-chat" class="hidden">
    <div class="max-w-2xl mx-auto px-4 py-6 flex flex-col" style="height: calc(100vh - 65px)">
      <div class="flex items-center gap-3 mb-4">
        <select id="agent-select" class="bg-card border border-border text-white rounded-lg px-3 py-2 text-sm">
          <option value="hvac">Dante — North York HVAC</option>
          <option value="law_firm">Claire — North York Law Firm</option>
        </select>
        <button onclick="startChat()" id="start-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg text-sm font-medium">Start Conversation</button>
        <button onclick="resetChat()" id="reset-btn" class="hidden bg-card border border-border hover:border-slate-500 text-slate-300 px-4 py-2 rounded-lg text-sm">Reset</button>
      </div>

      <div id="chat-messages" class="flex-1 overflow-y-auto space-y-3 mb-4 bg-card border border-border rounded-xl p-4">
        <p class="text-slate-500 text-sm text-center">Select an agent and start a conversation</p>
      </div>

      <div class="flex gap-2">
        <input id="chat-input" type="text" placeholder="Type your message..." disabled
          class="flex-1 bg-card border border-border rounded-lg px-4 py-2.5 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500"
          onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()" id="send-btn" disabled
          class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white px-5 py-2.5 rounded-lg text-sm font-medium">Send</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
